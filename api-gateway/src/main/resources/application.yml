server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/auth/**, /users/**
        - id: event-service
          uri: http://event-service:8082
          predicates:
            - Path=/events/**
        - id: seat-service
          uri: http://seat-service:8083
          predicates:
            - Path=/seats/**, /events/*/seats/**
        - id: queue-service
          uri: http://queue-service:8084
          predicates:
            - Path=/queue/**
        - id: booking-service
          uri: http://booking-service:8085
          predicates:
            - Path=/bookings/**
        - id: payment-service
          uri: http://payment-service:8086
          predicates:
            - Path=/payments/**
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

  data:
    redis:
      host: localhost
      port: 6379
